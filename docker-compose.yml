services:
  backend:
    build: ./packages/server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./packages/client
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend-data:
